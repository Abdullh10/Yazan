<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سوبريزون - المراحل المتقدمة والمسدس</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #0a1f2e 0%, #030e17 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Press Start 2P', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 16px 24px 24px;
            backdrop-filter: blur(3px);
            box-shadow: 0 20px 30px black;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
            gap: 12px;
            background: #2c1e0faa;
            padding: 8px 20px;
            border-radius: 60px;
            color: #ffefb9;
        }
        .stats {
            display: flex;
            gap: 24px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .weapon-status {
            background: #1e2a2e;
            padding: 4px 16px;
            border-radius: 32px;
            font-size: 0.9rem;
        }
        button {
            background: #e25822;
            border: none;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #5a2a00;
            transition: 0.05s linear;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a2a00; }
        .mission {
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 28px;
            font-size: 0.75rem;
        }
        @media (max-width: 800px) {
            .stats { font-size: 0.9rem; gap: 12px; }
            .weapon-status { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="950" height="460"></canvas>
    <div class="info-bar">
        <div class="stats">⭐ <span id="scoreValue">0</span> &nbsp;| ❤️ <span id="livesValue">3</span> &nbsp;| 🎯 المرحلة <span id="levelNum">1</span></div>
        <div class="weapon-status" id="weaponDisplay">🔫 مسدس: ❌</div>
        <div class="mission" id="missionText">📜 المهمة: اجمع 5 عملات</div>
        <button id="resetBtn">🔄 إعادة اللعبة</button>
    </div>
    <div style="font-size:12px; text-align:center; margin-top:10px; color:#ccc;">🎮 ←→ تحرك | ⬆/Space قفز | 🔫 (إذا معك مسدس) اضغط X لإطلاق النار | 📦 الصناديق تعطيك مسدساً!</div>
</div>

<script>
    (function(){
        // ------------------- إعدادات الصوت (Web Audio) -------------------
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function playSound(type) {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            }
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            if (type === 'jump') { osc.frequency.value = 523.25; gain.gain.setValueAtTime(0.15, now); }
            else if (type === 'coin') { osc.frequency.value = 880; osc.type = 'triangle'; gain.gain.setValueAtTime(0.1, now); }
            else if (type === 'kill') { osc.frequency.value = 220; osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.12, now); }
            else if (type === 'hurt') { osc.frequency.value = 150; gain.gain.setValueAtTime(0.25, now); }
            else if (type === 'powerup') { osc.frequency.value = 659.25; osc.type = 'square'; gain.gain.setValueAtTime(0.2, now); }
            else if (type === 'shoot') { osc.frequency.value = 880; osc.type = 'triangle'; gain.gain.setValueAtTime(0.08, now); }
            osc.start();
            osc.stop(now + 0.3);
        }
        
        // ------------------- مراحل اللعبة -------------------
        const LEVELS = [
            {   // المرحلة 1: غابة
                name: "غابة الأمل",
                mission: { type: "collect", target: 5, current: 0 },  // جمع 5 عملات
                startX: 80, startY: 0,
                platforms: [
                    { x: 0, y: 420, w: 2600, h: 40, type: 'ground' },
                    { x: 200, y: 360, w: 70, h: 20, type: 'wood' },
                    { x: 500, y: 320, w: 80, h: 20, type: 'brick' },
                    { x: 850, y: 280, w: 90, h: 20, type: 'stone' },
                    { x: 1200, y: 350, w: 80, h: 20, type: 'wood' },
                    { x: 1700, y: 300, w: 100, h: 20, type: 'brick' },
                    { x: 2200, y: 370, w: 70, h: 20, type: 'stone' }
                ],
                enemies: [
                    { x: 300, y: 388, w: 32, h: 32, vx: 0.8, minX: 250, maxX: 520 },
                    { x: 700, y: 388, w: 32, h: 32, vx: -1.0, minX: 600, maxX: 880 },
                    { x: 1050, y: 248, w: 32, h: 32, vx: 0.9, minX: 960, maxX: 1200 },
                    { x: 1900, y: 388, w: 32, h: 32, vx: 1.1, minX: 1800, maxX: 2100 }
                ],
                coins: [
                    { x: 240, y: 330 }, { x: 540, y: 285 }, { x: 890, y: 245 }, { x: 1250, y: 315 }, { x: 1750, y: 265 }, { x: 2050, y: 340 }, { x: 2250, y: 335 }
                ],
                traps: [],   // لا مصائد في المرحلة 1
                surpriseBoxes: [
                    { x: 450, y: 290, w: 28, h: 28, opened: false, type: 'gun' },
                    { x: 1550, y: 270, w: 28, h: 28, opened: false, type: 'gun' }
                ],
                flagX: 2520, flagY: 380
            },
            {   // المرحلة 2: صحراء مع مسامير وأعداء أكثر
                name: "وادي الرمال",
                mission: { type: "kill", target: 4, current: 0 },  // اقتل 4 أعداء
                startX: 80, startY: 0,
                platforms: [
                    { x: 0, y: 420, w: 2800, h: 40, type: 'sand' },
                    { x: 250, y: 370, w: 80, h: 20, type: 'brick' },
                    { x: 600, y: 330, w: 70, h: 20, type: 'wood' },
                    { x: 1000, y: 290, w: 100, h: 20, type: 'stone' },
                    { x: 1450, y: 350, w: 80, h: 20, type: 'brick' },
                    { x: 1900, y: 310, w: 90, h: 20, type: 'wood' },
                    { x: 2400, y: 370, w: 80, h: 20, type: 'stone' }
                ],
                enemies: [
                    { x: 320, y: 388, w: 32, h: 32, vx: 1.0, minX: 260, maxX: 560 },
                    { x: 680, y: 388, w: 32, h: 32, vx: -1.2, minX: 580, maxX: 850 },
                    { x: 1100, y: 258, w: 32, h: 32, vx: 0.9, minX: 1020, maxX: 1280 },
                    { x: 1550, y: 318, w: 32, h: 32, vx: 1.1, minX: 1480, maxX: 1720 },
                    { x: 2000, y: 278, w: 32, h: 32, vx: -0.8, minX: 1920, maxX: 2200 },
                    { x: 2500, y: 388, w: 32, h: 32, vx: 1.0, minX: 2420, maxX: 2680 }
                ],
                coins: [
                    { x: 290, y: 335 }, { x: 640, y: 295 }, { x: 1040, y: 255 }, { x: 1490, y: 315 }, { x: 1950, y: 275 }, { x: 2450, y: 335 }
                ],
                traps: [  // مصائد (مسامير)
                    { x: 800, y: 410, w: 40, h: 15, damage: true },
                    { x: 1350, y: 410, w: 50, h: 15, damage: true },
                    { x: 2100, y: 410, w: 60, h: 15, damage: true }
                ],
                surpriseBoxes: [
                    { x: 900, y: 300, w: 28, h: 28, opened: false, type: 'gun' },
                    { x: 2300, y: 340, w: 28, h: 28, opened: false, type: 'gun' }
                ],
                flagX: 2720, flagY: 380
            },
            {   // المرحلة 3: قلعة الجليد – عوائق كثيرة ومسدس إجباري
                name: "قلعة الجليد",
                mission: { type: "collect", target: 7, current: 0 }, // جمع 7 عملات
                startX: 80, startY: 0,
                platforms: [
                    { x: 0, y: 420, w: 3000, h: 40, type: 'ice' },
                    { x: 180, y: 360, w: 70, h: 20, type: 'stone' },
                    { x: 480, y: 310, w: 80, h: 20, type: 'brick' },
                    { x: 850, y: 260, w: 90, h: 20, type: 'wood' },
                    { x: 1250, y: 340, w: 80, h: 20, type: 'stone' },
                    { x: 1700, y: 290, w: 100, h: 20, type: 'brick' },
                    { x: 2200, y: 360, w: 80, h: 20, type: 'wood' },
                    { x: 2650, y: 380, w: 70, h: 20, type: 'stone' }
                ],
                enemies: [
                    { x: 280, y: 388, w: 32, h: 32, vx: 1.2, minX: 220, maxX: 500 },
                    { x: 580, y: 278, w: 32, h: 32, vx: -1.0, minX: 520, maxX: 750 },
                    { x: 950, y: 228, w: 32, h: 32, vx: 0.9, minX: 880, maxX: 1120 },
                    { x: 1350, y: 308, w: 32, h: 32, vx: 1.1, minX: 1280, maxX: 1580 },
                    { x: 1850, y: 258, w: 32, h: 32, vx: -1.0, minX: 1780, maxX: 2050 },
                    { x: 2350, y: 388, w: 32, h: 32, vx: 1.0, minX: 2280, maxX: 2600 }
                ],
                coins: [
                    { x: 220, y: 325 }, { x: 520, y: 275 }, { x: 890, y: 225 }, { x: 1290, y: 305 }, { x: 1750, y: 255 }, 
                    { x: 2250, y: 325 }, { x: 2500, y: 345 }, { x: 2700, y: 350 }
                ],
                traps: [
                    { x: 700, y: 410, w: 50, h: 15, damage: true },
                    { x: 1200, y: 410, w: 60, h: 15, damage: true },
                    { x: 1900, y: 410, w: 55, h: 15, damage: true },
                    { x: 2400, y: 410, w: 70, h: 15, damage: true }
                ],
                surpriseBoxes: [
                    { x: 400, y: 330, w: 28, h: 28, opened: false, type: 'gun' },
                    { x: 1600, y: 260, w: 28, h: 28, opened: false, type: 'gun' },
                    { x: 2550, y: 350, w: 28, h: 28, opened: false, type: 'gun' }
                ],
                flagX: 2920, flagY: 380
            }
        ];
        
        let currentLevelIdx = 0;      // 0-index
        let levelData = null;
        let gameActive = true, levelCompleted = false, gameOverFlag = false;
        let score = 0, lives = 3;
        let hasGun = false;
        let bullets = [];    // {x, y, w, h, vx}
        let missionProgress = 0;
        
        // عناصر اللاعب
        const PLAYER_W = 32, PLAYER_H = 36;
        let player = {
            x: 80, y: 0, vx: 0, vy: 0, onGround: true, facingRight: true, invincibleTimer: 0
        };
        
        // عناصر المستوى الديناميكية
        let platforms = [], enemies = [], coins = [], traps = [], surpriseBoxes = [];
        let flag = { x: 0, y: 0, reached: false };
        
        // فيزياء
        const GRAVITY = 0.82, JUMP = -11.2, WALK_ACC = 0.85, MAX_SPEED = 5.6, FRICTION_GROUND = 0.92, FRICTION_AIR = 0.98;
        let cameraX = 0;
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, Space: false };
        let canJump = true, jumpRequest = false;
        
        // مرجع canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // تحديث واجهة
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('livesValue').innerText = lives;
            document.getElementById('levelNum').innerText = currentLevelIdx+1;
            document.getElementById('weaponDisplay').innerHTML = hasGun ? "🔫 مسدس: ✅ (اضغط X)" : "🔫 مسدس: ❌";
            let mission = levelData.mission;
            let missionText = mission.type === 'collect' ? `📜 اجمع ${mission.target} عملة (${missionProgress}/${mission.target})` : `📜 اقتل ${mission.target} عدو (${missionProgress}/${mission.target})`;
            document.getElementById('missionText').innerText = missionText;
        }
        
        // تحميل بيانات المرحلة الحالية
        function loadLevel(levelIndex) {
            levelData = LEVELS[levelIndex];
            // نسخ عميق للعناصر
            platforms = JSON.parse(JSON.stringify(levelData.platforms));
            enemies = JSON.parse(JSON.stringify(levelData.enemies));
            coins = JSON.parse(JSON.stringify(levelData.coins));
            traps = JSON.parse(JSON.stringify(levelData.traps || []));
            surpriseBoxes = JSON.parse(JSON.stringify(levelData.surpriseBoxes || []));
            flag = { x: levelData.flagX, y: levelData.flagY, reached: false };
            // إعادة ضبط مهمة المرحلة
            missionProgress = 0;
            hasGun = false;
            bullets = [];
            // ضبط بداية اللاعب
            let startX = levelData.startX;
            let startY = levelData.startY;
            // حساب Y المناسب
            for(let plat of platforms) {
                if(startX + PLAYER_W > plat.x && startX < plat.x+plat.w) {
                    startY = plat.y - PLAYER_H;
                    break;
                }
            }
            if(startY === 0) startY = 420 - PLAYER_H;
            player = {
                x: startX, y: startY, vx: 0, vy: 0, onGround: true, facingRight: true, invincibleTimer: 0
            };
            gameActive = true;
            levelCompleted = false;
            gameOverFlag = false;
            cameraX = 0;
            updateUI();
        }
        
        // إعادة تعيين كاملة
        function fullReset() {
            currentLevelIdx = 0;
            score = 0;
            lives = 3;
            loadLevel(currentLevelIdx);
            updateUI();
            removeMessage();
        }
        
        function nextLevel() {
            if (currentLevelIdx + 1 < LEVELS.length) {
                currentLevelIdx++;
                loadLevel(currentLevelIdx);
                playSound('powerup');
                showMessage(`✨ المرحلة ${currentLevelIdx+1}: ${LEVELS[currentLevelIdx].name} ✨`, false);
            } else {
                showMessage("🏆 تهانينا! أكملت اللعبة بالكامل 🏆", false);
                gameActive = false;
                levelCompleted = true;
            }
        }
        
        // تحديث المهمة
        function updateMission(progressDelta, type) {
            if (levelData.mission.type === type) {
                missionProgress += progressDelta;
                if (missionProgress >= levelData.mission.target) {
                    showMessage(`✅ اكتملت المهمة! انتقل إلى العلم ✅`, false);
                    // لا ننهي المرحلة مباشرة، لكن العلم يصبح متاحاً (هو موجود)
                }
                updateUI();
            }
        }
        
        // خسارة حياة
        function loseLife() {
            if (!gameActive || levelCompleted || gameOverFlag) return;
            if (player.invincibleTimer > 0) return;
            playSound('hurt');
            lives--;
            updateUI();
            if (lives <= 0) {
                gameActive = false;
                gameOverFlag = true;
                showMessage("💀 GAME OVER 💀", true);
            } else {
                player.invincibleTimer = 40;
                // إعادة اللاعب لبداية المرحلة
                for(let plat of platforms) {
                    if(levelData.startX + PLAYER_W > plat.x && levelData.startX < plat.x+plat.w) {
                        player.y = plat.y - PLAYER_H;
                        break;
                    }
                }
                player.x = levelData.startX;
                player.vy = 0;
                player.vx = 0;
                showMessage(`💔 خسرت حياة! متبقي ${lives}`, true);
            }
        }
        
        // قتل عدو (من القفز أو الرصاص)
        function killEnemy(idx) {
            if (!gameActive) return;
            score += 20;
            updateUI();
            enemies.splice(idx,1);
            playSound('kill');
            if (levelData.mission.type === 'kill') updateMission(1, 'kill');
            showMessage("⚡ +20 ⚡", false);
        }
        
        // جمع عملة
        function collectCoin(idx) {
            if (!gameActive) return;
            score += 10;
            updateUI();
            coins.splice(idx,1);
            playSound('coin');
            if (levelData.mission.type === 'collect') updateMission(1, 'collect');
        }
        
        // فتح صندوق مفاجأة
        function openBox(box) {
            if (box.opened) return;
            box.opened = true;
            playSound('powerup');
            if (box.type === 'gun') {
                hasGun = true;
                showMessage("🎁 حصلت على مسدس! اضغط X لإطلاق النار 🎁", false);
                updateUI();
            }
        }
        
        // إطلاق رصاصة
        function shoot() {
            if (!gameActive || !hasGun) return;
            playSound('shoot');
            let dir = player.facingRight ? 1 : -1;
            bullets.push({
                x: player.x + (player.facingRight ? PLAYER_W : -10),
                y: player.y + PLAYER_H/2 - 4,
                w: 10, h: 6,
                vx: dir * 9
            });
        }
        
        // تحديث الفيزياء والمنطق
        function updateGame() {
            if (!gameActive) return;
            if (player.invincibleTimer > 0) player.invincibleTimer--;
            
            // حركة
            let acc = 0;
            if (keys.ArrowLeft) acc = -WALK_ACC;
            if (keys.ArrowRight) acc = WALK_ACC;
            player.vx += acc;
            if (Math.abs(player.vx) > MAX_SPEED) player.vx = player.vx > 0 ? MAX_SPEED : -MAX_SPEED;
            if (player.onGround) player.vx *= FRICTION_GROUND;
            else player.vx *= FRICTION_AIR;
            if (Math.abs(player.vx) < 0.2) player.vx = 0;
            
            if ((keys.ArrowUp || keys.Space) && player.onGround && canJump && !jumpRequest) {
                player.vy = JUMP;
                player.onGround = false;
                canJump = false;
                jumpRequest = true;
                playSound('jump');
            }
            if (!keys.ArrowUp && !keys.Space) { jumpRequest = false; canJump = true; }
            
            player.vy += GRAVITY;
            // تصادم أفقي
            player.x += player.vx;
            for(let plat of platforms) {
                if (player.x + PLAYER_W > plat.x && player.x < plat.x+plat.w && player.y+PLAYER_H > plat.y && player.y < plat.y+plat.h) {
                    if (player.vx > 0) player.x = plat.x - PLAYER_W;
                    else if (player.vx < 0) player.x = plat.x + plat.w;
                }
            }
            // عمودي
            player.y += player.vy;
            player.onGround = false;
            for(let plat of platforms) {
                if (player.x + PLAYER_W > plat.x && player.x < plat.x+plat.w && player.y+PLAYER_H > plat.y && player.y < plat.y+plat.h) {
                    if (player.vy >= 0 && (player.y+PLAYER_H - player.vy) <= plat.y+12) {
                        player.y = plat.y - PLAYER_H;
                        player.vy = 0;
                        player.onGround = true;
                    } else if (player.vy < 0 && player.y <= plat.y+plat.h) {
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    }
                }
            }
            // حدود العالم
            if (player.y + PLAYER_H > 460) { loseLife(); if(gameActive) player.y = 400; }
            if (player.x < 25) player.x = 25;
            if (player.x + PLAYER_W > 3000) player.x = 3000 - PLAYER_W;
            if (player.vx !== 0) player.facingRight = player.vx > 0;
            
            // تحديث الأعداء وتصادمهم
            for (let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                e.x += e.vx;
                if (e.x <= e.minX) { e.x = e.minX; e.vx = Math.abs(e.vx); }
                if (e.x + e.w >= e.maxX) { e.x = e.maxX - e.w; e.vx = -Math.abs(e.vx); }
                if (player.invincibleTimer === 0 && !levelCompleted) {
                    if (player.x < e.x+e.w && player.x+PLAYER_W > e.x && player.y < e.y+e.h && player.y+PLAYER_H > e.y) {
                        let isJumpAttack = (player.vy > 0 && (player.y+PLAYER_H - player.vy) <= e.y+12);
                        if (isJumpAttack) { killEnemy(i); i--; player.vy = -7; }
                        else { loseLife(); if(gameActive) player.y = 400; break; }
                    }
                }
            }
            
            // الرصاص
            for (let i=0; i<bullets.length; i++) {
                bullets[i].x += bullets[i].vx;
                if (bullets[i].x > 3000 || bullets[i].x + bullets[i].w < 0) { bullets.splice(i,1); i--; continue; }
                let hit = false;
                for (let j=0; j<enemies.length; j++) {
                    let e = enemies[j];
                    if (bullets[i].x < e.x+e.w && bullets[i].x+bullets[i].w > e.x &&
                        bullets[i].y < e.y+e.h && bullets[i].y+bullets[i].h > e.y) {
                        killEnemy(j);
                        hit = true;
                        break;
                    }
                }
                if (hit) { bullets.splice(i,1); i--; }
            }
            
            // العملات
            for (let i=0; i<coins.length; i++) {
                let c = coins[i];
                if (player.x < c.x+14 && player.x+PLAYER_W > c.x && player.y < c.y+14 && player.y+PLAYER_H > c.y) {
                    collectCoin(i); i--;
                }
            }
            // المصائد
            for (let t of traps) {
                if (player.x < t.x+t.w && player.x+PLAYER_W > t.x && player.y+PLAYER_H > t.y && player.y < t.y+t.h) {
                    loseLife(); if(gameActive) player.y = 400;
                }
            }
            // الصناديق
            for (let box of surpriseBoxes) {
                if (!box.opened && player.x < box.x+box.w && player.x+PLAYER_W > box.x && player.y+PLAYER_H > box.y && player.y < box.y+box.h) {
                    openBox(box);
                }
            }
            // العلم (يسمح بالانتقال فقط إذا اكتملت المهمة)
            if (!flag.reached && !levelCompleted && missionProgress >= levelData.mission.target) {
                if (player.x + PLAYER_W > flag.x && player.x < flag.x+28 && player.y+PLAYER_H > flag.y && player.y < flag.y+58) {
                    flag.reached = true;
                    playSound('powerup');
                    showMessage(`🎉 اجتياز المرحلة ${currentLevelIdx+1}! انتقل إلى التالي 🎉`, false);
                    levelCompleted = true;
                    gameActive = false;
                    setTimeout(() => { nextLevel(); }, 500);
                }
            }
            // كاميرا
            let targetCam = player.x + PLAYER_W/2 - canvas.width/2;
            targetCam = Math.max(0, Math.min(targetCam, 3000 - canvas.width));
            cameraX = targetCam;
        }
        
        // رسم متطور
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // خلفية متدرجة حسب المرحلة
            let grad = ctx.createLinearGradient(0,0,0,canvas.height);
            if (currentLevelIdx===0) { grad.addColorStop(0,"#7ec8ff"); grad.addColorStop(1,"#4aa3df"); }
            else if (currentLevelIdx===1) { grad.addColorStop(0,"#f7d794"); grad.addColorStop(1,"#e0a96b"); }
            else { grad.addColorStop(0,"#b0d4ff"); grad.addColorStop(1,"#7ca5d0"); }
            ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
            // منصات
            for(let p of platforms){
                let dx=p.x-cameraX;
                if(p.type==='ground') ctx.fillStyle="#5b8c50";
                else if(p.type==='sand') ctx.fillStyle="#d4a373";
                else if(p.type==='ice') ctx.fillStyle="#a5d6ff";
                else ctx.fillStyle="#bc7a3c";
                ctx.fillRect(dx,p.y,p.w,p.h);
            }
            // مصائد
            for(let t of traps){
                ctx.fillStyle="#aa2e1e"; ctx.fillRect(t.x-cameraX,t.y,t.w,t.h);
                ctx.fillStyle="#d9534f"; for(let i=0;i<3;i++) ctx.fillRect(t.x-cameraX+5+i*10,t.y-4,4,8);
            }
            // عملات
            for(let c of coins){ ctx.fillStyle="#FFD966"; ctx.beginPath(); ctx.ellipse(c.x-cameraX+7,c.y+7,7,7,0,0,Math.PI*2); ctx.fill(); }
            // صناديق
            for(let b of surpriseBoxes){
                if(!b.opened){ ctx.fillStyle="#a5673f"; ctx.fillRect(b.x-cameraX,b.y,b.w,b.h); ctx.fillStyle="#d48c4a"; ctx.fillRect(b.x-cameraX+4,b.y+4,20,20); ctx.fillStyle="gold"; ctx.font="bold 18px monospace"; ctx.fillText("?",b.x-cameraX+9,b.y+22);}
            }
            // أعداء
            for(let e of enemies){
                ctx.fillStyle="#8B5A2B"; ctx.fillRect(e.x-cameraX,e.y,e.w,e.h);
                ctx.fillStyle="white"; ctx.fillRect(e.x-cameraX+7,e.y+18,6,6); ctx.fillRect(e.x-cameraX+e.w-13,e.y+18,6,6);
                ctx.fillStyle="black"; ctx.fillRect(e.x-cameraX+8,e.y+19,3,3); ctx.fillRect(e.x-cameraX+e.w-12,e.y+19,3,3);
            }
            // رصاص
            for(let b of bullets){ ctx.fillStyle="#FFA500"; ctx.fillRect(b.x-cameraX,b.y,b.w,b.h); }
            // العلم
            ctx.fillStyle="#c0392b"; ctx.fillRect(flag.x-cameraX,flag.y,10,58);
            ctx.fillStyle="#e67e22"; ctx.beginPath(); ctx.moveTo(flag.x-cameraX+10,flag.y+12); ctx.lineTo(flag.x-cameraX+48,flag.y+28); ctx.lineTo(flag.x-cameraX+10,flag.y+44); ctx.fill();
            // اللاعب
            let px=player.x-cameraX;
            ctx.fillStyle="#E63946"; ctx.fillRect(px+4,player.y-12,24,14);
            ctx.fillStyle="#FDD7A4"; ctx.fillRect(px+6,player.y+4,20,22);
            ctx.fillStyle="black"; ctx.fillRect(px+9,player.y+10,5,6); ctx.fillRect(px+18,player.y+10,5,6);
            ctx.fillStyle="#2A6F8F"; ctx.fillRect(px+4,player.y+28,24,8);
            if(hasGun){ ctx.fillStyle="#555"; ctx.fillRect(px+28,player.y+20,12,6); }
        }
        
        function showMessage(text, isErr){
            let mDiv=document.getElementById('msgToast');
            if(!mDiv){ let d=document.createElement('div'); d.id='msgToast'; d.style.position='fixed'; d.style.bottom='20%'; d.style.left='50%'; d.style.transform='translateX(-50%)'; d.style.background='#000000cc'; d.style.color='gold'; d.style.padding='8px 20px'; d.style.borderRadius='40px'; d.style.fontWeight='bold'; d.style.zIndex='999'; document.body.appendChild(d); mDiv=d; }
            mDiv.innerText=text; mDiv.style.display='block'; setTimeout(()=>{ if(mDiv) mDiv.style.display='none'; },1500);
        }
        function removeMessage(){ let m=document.getElementById('msgToast'); if(m) m.style.display='none'; }
        
        // أحداث
        window.addEventListener('keydown', (e)=>{
            if(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key==='ArrowUp'||e.key===' '||e.key==='x'||e.key==='X') e.preventDefault();
            if(e.key==='ArrowLeft') keys.ArrowLeft=true;
            if(e.key==='ArrowRight') keys.ArrowRight=true;
            if(e.key==='ArrowUp') keys.ArrowUp=true;
            if(e.key===' ') keys.Space=true;
            if(e.key==='x'||e.key==='X') shoot();
        });
        window.addEventListener('keyup', (e)=>{
            if(e.key==='ArrowLeft') keys.ArrowLeft=false;
            if(e.key==='ArrowRight') keys.ArrowRight=false;
            if(e.key==='ArrowUp') keys.ArrowUp=false;
            if(e.key===' ') keys.Space=false;
        });
        document.getElementById('resetBtn').addEventListener('click', ()=>{ fullReset(); });
        fullReset();
        function animate(){ updateGame(); draw(); requestAnimationFrame(animate); }
        animate();
        // تنشيط الصوت عند أول تفاعل
        canvas.addEventListener('click', ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); });
    })();
</script>
</body>
</html>
