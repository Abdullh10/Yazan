<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سوبريزون - لعبة المنصات</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a1f2e 0%, #04131f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Press Start 2P', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 16px 24px 24px 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
            backdrop-filter: blur(2px);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px black;
            cursor: pointer;
            background: #7ec8ff;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            padding: 8px 20px;
            background: #ffd966cc;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            color: #2c1e0f;
            font-weight: bold;
            gap: 20px;
            flex-wrap: wrap;
        }

        .game-title {
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 3px 3px 0 #ff8c42;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffd966, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }
        .game-title span {
            background: none;
            color: #ffd966;
            text-shadow: 2px 2px 0 #b45f1b;
        }

        .stats {
            display: flex;
            gap: 24px;
            background: #1e2a2ecc;
            padding: 6px 20px;
            border-radius: 40px;
            color: #f9e45b;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .controls {
            background: #000000aa;
            padding: 5px 16px;
            border-radius: 32px;
            font-size: 0.8rem;
            display: flex;
            gap: 18px;
        }

        button {
            background: #e25822;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.08s linear;
            box-shadow: 0 4px 0 #6b2e00;
            font-family: monospace;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6b2e00;
        }

        .info-text {
            text-align: center;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #dddddd;
            background: #00000066;
            border-radius: 28px;
            padding: 4px;
        }

        @media (max-width: 860px) {
            .game-title { font-size: 1.2rem; }
            .stats { font-size: 1rem; gap: 12px; }
            .controls { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-header">
        <div class="game-title">✨ سوبريزون ✨ <span style="font-size:0.8rem;">SUPREAZON</span></div>
        <div class="stats">
            <div>⭐ <span id="scoreValue">0</span></div>
            <div>❤️ <span id="livesValue">3</span></div>
        </div>
        <div class="controls">
            🎮 ← →  للتحرك &nbsp;|&nbsp; ⬆ / Space للقفز
        </div>
        <button id="resetButton">🔄 إعادة اللعبة</button>
    </div>
    <canvas id="gameCanvas" width="900" height="450"></canvas>
    <div class="info-text">
        💡 اقفز على الأعداء للقضاء عليهم (+20) | اجمع العملات الذهبية (+10) | تجنب لمس الأعداء جانبياً | احصل على العلم 🔥
    </div>
</div>

<script>
    (function(){
        // ------------------- إعدادات اللعبة المتطورة -------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // أبعاد المستوى
        const LEVEL_WIDTH = 2800;
        const GROUND_Y = 410;   // مستوى الأرض (أسفل الشاشة canvas ارتفاع 450)
        
        // اللاعب المحسن
        const PLAYER_WIDTH = 32;
        const PLAYER_HEIGHT = 36;
        let player = {
            x: 100,
            y: 0,
            vx: 0,
            vy: 0,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
            onGround: true,
            facingRight: true,
            invincibleTimer: 0   // للوميض بعد الإصابة
        };
        
        // فيزياء ممتعة
        const GRAVITY = 0.82;
        const JUMP_POWER = -11.2;
        const WALK_ACC = 0.85;
        const MAX_SPEED = 5.6;
        const FRICTION_AIR = 0.98;
        const FRICTION_GROUND = 0.92;
        
        // التحكم
        const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, Space: false };
        let canJump = true;
        let jumpRequest = false;
        
        // متغيرات اللعبة
        let score = 0;
        let lives = 3;
        let gameActive = true;
        let levelCompleted = false;
        let gameOverFlag = false;
        let cameraX = 0;
        
        // ---------- مستوى غني وجميل (منصات متنوعة) ----------
        let platforms = [
            { x: 0, y: GROUND_Y, w: LEVEL_WIDTH, h: 40, type: 'ground' },
            { x: 180, y: 350, w: 70, h: 20, type: 'brick' },
            { x: 430, y: 310, w: 80, h: 20, type: 'wood' },
            { x: 750, y: 260, w: 90, h: 20, type: 'stone' },
            { x: 1050, y: 320, w: 100, h: 20, type: 'brick' },
            { x: 1400, y: 270, w: 70, h: 20, type: 'wood' },
            { x: 1750, y: 340, w: 80, h: 20, type: 'stone' },
            { x: 2150, y: 300, w: 80, h: 20, type: 'brick' },
            { x: 2450, y: 360, w: 70, h: 20, type: 'wood' },
            { x: 2650, y: 380, w: 60, h: 20, type: 'stone' }
        ];
        
        // أعداء محسنون (شخصيات لطيفة)
        let enemies = [
            { x: 320, y: GROUND_Y - 32, w: 32, h: 32, vx: 0.85, minX: 240, maxX: 550, type: 'goomba' },
            { x: 680, y: GROUND_Y - 32, w: 32, h: 32, vx: -1.0, minX: 580, maxX: 880, type: 'goomba' },
            { x: 980, y: 228, w: 32, h: 32, vx: 0.9, minX: 880, maxX: 1150, type: 'goomba' },
            { x: 1450, y: GROUND_Y - 32, w: 32, h: 32, vx: -1.1, minX: 1360, maxX: 1650, type: 'goomba' },
            { x: 1880, y: 278, w: 32, h: 32, vx: 0.95, minX: 1800, maxX: 2080, type: 'goomba' },
            { x: 2300, y: GROUND_Y - 32, w: 32, h: 32, vx: 1.0, minX: 2220, maxX: 2520, type: 'goomba' }
        ];
        
        // عملات ذهبية متألقة
        let coins = [
            { x: 210, y: 320, w: 14, h: 14 }, { x: 460, y: 275, w: 14, h: 14 }, { x: 500, y: 275, w: 14, h: 14 },
            { x: 790, y: 225, w: 14, h: 14 }, { x: 830, y: 225, w: 14, h: 14 }, { x: 1080, y: 285, w: 14, h: 14 },
            { x: 1120, y: 285, w: 14, h: 14 }, { x: 1160, y: 285, w: 14, h: 14 }, { x: 1520, y: 330, w: 14, h: 14 },
            { x: 1560, y: 330, w: 14, h: 14 }, { x: 1820, y: 300, w: 14, h: 14 }, { x: 1860, y: 300, w: 14, h: 14 },
            { x: 2210, y: 265, w: 14, h: 14 }, { x: 2250, y: 265, w: 14, h: 14 }, { x: 2490, y: 325, w: 14, h: 14 },
            { x: 2530, y: 325, w: 14, h: 14 }, { x: 2700, y: 345, w: 14, h: 14 }
        ];
        
        // علم النهاية
        let flag = { x: 2740, y: GROUND_Y - 58, w: 28, h: 58, reached: false };
        let startPosition = { x: 100, y: 0 };
        
        // وظائف مساعدة
        function updatePlayerStartY() {
            for(let plat of platforms) {
                if(startPosition.x + PLAYER_WIDTH > plat.x && startPosition.x < plat.x+plat.w) {
                    startPosition.y = plat.y - PLAYER_HEIGHT;
                    return;
                }
            }
            startPosition.y = GROUND_Y - PLAYER_HEIGHT;
        }
        
        function respawnPlayer() {
            player.x = startPosition.x;
            player.y = startPosition.y;
            player.vx = 0;
            player.vy = 0;
            player.onGround = true;
            player.invincibleTimer = 0;
            canJump = true;
            jumpRequest = false;
        }
        
        function fullGameReset() {
            gameActive = true;
            levelCompleted = false;
            gameOverFlag = false;
            score = 0;
            lives = 3;
            updateUI();
            resetCollectiblesAndEnemies();
            flag.reached = false;
            respawnPlayer();
            cameraX = 0;
            removeMessage();
        }
        
        function resetCollectiblesAndEnemies() {
            const originalCoins = [
                { x: 210, y: 320, w: 14, h: 14 }, { x: 460, y: 275, w: 14, h: 14 }, { x: 500, y: 275, w: 14, h: 14 },
                { x: 790, y: 225, w: 14, h: 14 }, { x: 830, y: 225, w: 14, h: 14 }, { x: 1080, y: 285, w: 14, h: 14 },
                { x: 1120, y: 285, w: 14, h: 14 }, { x: 1160, y: 285, w: 14, h: 14 }, { x: 1520, y: 330, w: 14, h: 14 },
                { x: 1560, y: 330, w: 14, h: 14 }, { x: 1820, y: 300, w: 14, h: 14 }, { x: 1860, y: 300, w: 14, h: 14 },
                { x: 2210, y: 265, w: 14, h: 14 }, { x: 2250, y: 265, w: 14, h: 14 }, { x: 2490, y: 325, w: 14, h: 14 },
                { x: 2530, y: 325, w: 14, h: 14 }, { x: 2700, y: 345, w: 14, h: 14 }
            ];
            coins.length = 0;
            originalCoins.forEach(c => coins.push({...c}));
            
            const originalEnemies = [
                { x: 320, y: GROUND_Y - 32, w: 32, h: 32, vx: 0.85, minX: 240, maxX: 550, type: 'goomba' },
                { x: 680, y: GROUND_Y - 32, w: 32, h: 32, vx: -1.0, minX: 580, maxX: 880, type: 'goomba' },
                { x: 980, y: 228, w: 32, h: 32, vx: 0.9, minX: 880, maxX: 1150, type: 'goomba' },
                { x: 1450, y: GROUND_Y - 32, w: 32, h: 32, vx: -1.1, minX: 1360, maxX: 1650, type: 'goomba' },
                { x: 1880, y: 278, w: 32, h: 32, vx: 0.95, minX: 1800, maxX: 2080, type: 'goomba' },
                { x: 2300, y: GROUND_Y - 32, w: 32, h: 32, vx: 1.0, minX: 2220, maxX: 2520, type: 'goomba' }
            ];
            enemies.length = 0;
            originalEnemies.forEach(e => enemies.push({...e}));
        }
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('livesValue').innerText = lives;
        }
        
        let messageTimeout = null;
        function showMessage(text, isError = false) {
            let msgDiv = document.getElementById('dynamicMessage');
            if(!msgDiv) {
                const div = document.createElement('div');
                div.id = 'dynamicMessage';
                div.style.position = 'fixed';
                div.style.top = '30%';
                div.style.left = '50%';
                div.style.transform = 'translate(-50%, -50%)';
                div.style.background = isError ? '#aa2222dd' : '#2c8e5edd';
                div.style.backdropFilter = 'blur(12px)';
                div.style.padding = '16px 28px';
                div.style.borderRadius = '60px';
                div.style.color = 'white';
                div.style.fontSize = '1.6rem';
                div.style.fontWeight = 'bold';
                div.style.fontFamily = 'monospace';
                div.style.zIndex = '100';
                div.style.whiteSpace = 'nowrap';
                document.body.appendChild(div);
                msgDiv = div;
            }
            msgDiv.innerText = text;
            msgDiv.style.display = 'block';
            if(messageTimeout) clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => { if(msgDiv) msgDiv.style.display = 'none'; }, 1700);
        }
        
        function removeMessage() {
            const msgDiv = document.getElementById('dynamicMessage');
            if(msgDiv) msgDiv.style.display = 'none';
        }
        
        function loseLife() {
            if(!gameActive || levelCompleted || gameOverFlag) return;
            if(player.invincibleTimer > 0) return; // حماية قصيرة
            lives--;
            updateUI();
            if(lives <= 0) {
                gameActive = false;
                gameOverFlag = true;
                showMessage("💀 GAME OVER 💀", true);
            } else {
                player.invincibleTimer = 40;  // وميض لمدة 40 إطار
                respawnPlayer();
                showMessage(`💔 خسرت حياة! ❤️ ${lives} متبقية`, true);
            }
        }
        
        function killEnemy(index) {
            if(!gameActive) return;
            score += 20;
            updateUI();
            enemies.splice(index,1);
            showMessage("✨ +20 ✨", false);
        }
        
        function collectCoin(index) {
            if(!gameActive) return;
            score += 10;
            updateUI();
            coins.splice(index,1);
        }
        
        function completeLevel() {
            if(levelCompleted) return;
            levelCompleted = true;
            gameActive = false;
            showMessage("🏆 فزت! 🏆 سوبريزون ينتصر!", false);
        }
        
        // تحديث الفيزياء والتصادم
        function updateGame() {
            if(!gameActive) return;
            
            // تحديث مؤشر الحصانة
            if(player.invincibleTimer > 0) player.invincibleTimer--;
            
            // التحكم
            let acc = 0;
            if(keys.ArrowLeft) acc = -WALK_ACC;
            if(keys.ArrowRight) acc = WALK_ACC;
            player.vx += acc;
            if(Math.abs(player.vx) > MAX_SPEED) player.vx = player.vx > 0 ? MAX_SPEED : -MAX_SPEED;
            if(player.onGround) player.vx *= FRICTION_GROUND;
            else player.vx *= FRICTION_AIR;
            if(Math.abs(player.vx) < 0.2) player.vx = 0;
            
            if((keys.ArrowUp || keys.Space) && player.onGround && canJump && !jumpRequest) {
                player.vy = JUMP_POWER;
                player.onGround = false;
                canJump = false;
                jumpRequest = true;
            }
            if(!keys.ArrowUp && !keys.Space) { jumpRequest = false; canJump = true; }
            
            player.vy += GRAVITY;
            
            // تصادم أفقي
            player.x += player.vx;
            for(let plat of platforms) {
                if(player.x + player.width > plat.x && player.x < plat.x + plat.w &&
                   player.y + player.height > plat.y && player.y < plat.y + plat.h) {
                    if(player.vx > 0) player.x = plat.x - player.width;
                    else if(player.vx < 0) player.x = plat.x + plat.w;
                }
            }
            
            // تصادم عمودي
            player.y += player.vy;
            player.onGround = false;
            for(let plat of platforms) {
                if(player.x + player.width > plat.x && player.x < plat.x + plat.w &&
                   player.y + player.height > plat.y && player.y < plat.y + plat.h) {
                    if(player.vy >= 0 && (player.y + player.height - player.vy) <= plat.y + 12) {
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    } else if(player.vy < 0 && player.y <= plat.y + plat.h) {
                        player.y = plat.y + plat.h;
                        player.vy = 0;
                    }
                }
            }
            
            if(player.y + player.height > GROUND_Y + 45) {
                loseLife();
                if(gameActive) respawnPlayer();
            }
            if(player.x < 25) player.x = 25;
            if(player.x + player.width > LEVEL_WIDTH - 25) player.x = LEVEL_WIDTH - player.width - 25;
            if(player.vx !== 0) player.facingRight = player.vx > 0;
            
            // الأعداء المتحركون
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                e.x += e.vx;
                if(e.x <= e.minX) { e.x = e.minX; e.vx = Math.abs(e.vx); }
                if(e.x + e.w >= e.maxX) { e.x = e.maxX - e.w; e.vx = -Math.abs(e.vx); }
                
                if(player.invincibleTimer === 0 && !levelCompleted && gameActive) {
                    if(player.x < e.x+e.w && player.x+player.width > e.x &&
                       player.y < e.y+e.h && player.y+player.height > e.y) {
                        let isJumpAttack = (player.vy > 0 && (player.y+player.height - player.vy) <= e.y+12);
                        if(isJumpAttack) {
                            killEnemy(i);
                            i--;
                            player.vy = -7;
                            continue;
                        } else {
                            loseLife();
                            if(gameActive) respawnPlayer();
                            break;
                        }
                    }
                }
            }
            
            // العملات
            for(let i=0; i<coins.length; i++) {
                let c = coins[i];
                if(player.x < c.x+c.w && player.x+player.width > c.x &&
                   player.y < c.y+c.h && player.y+player.height > c.y) {
                    collectCoin(i);
                    i--;
                }
            }
            
            // العلم
            if(!flag.reached && !levelCompleted) {
                if(player.x + player.width > flag.x && player.x < flag.x+flag.w &&
                   player.y + player.height > flag.y && player.y < flag.y+flag.h) {
                    flag.reached = true;
                    completeLevel();
                }
            }
            
            // الكاميرا
            let targetCam = player.x + player.width/2 - canvas.width/2;
            targetCam = Math.max(0, Math.min(targetCam, LEVEL_WIDTH - canvas.width));
            cameraX = targetCam;
        }
        
        // ------------------- رسم احترافي وجذاب -------------------
        function drawBackground() {
            // السماء المتدرجة
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, "#7ec8ff");
            grad.addColorStop(0.7, "#5ba5d0");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // غيوم
            ctx.fillStyle = "rgba(255,255,245,0.85)";
            for(let i=0;i<5;i++) {
                let cloudX = (i*270 - cameraX*0.3) % (canvas.width+400) - 200;
                ctx.beginPath();
                ctx.ellipse(cloudX, 50, 45, 35, 0, 0, Math.PI*2);
                ctx.ellipse(cloudX+40, 40, 40, 32, 0, 0, Math.PI*2);
                ctx.ellipse(cloudX-30, 45, 38, 30, 0, 0, Math.PI*2);
                ctx.fill();
            }
            // تلال بعيدة
            ctx.fillStyle = "#87b96a";
            for(let t=0; t<5; t++) {
                let hillX = (t*400 - cameraX*0.5) % (LEVEL_WIDTH+300) - 200;
                ctx.beginPath();
                ctx.moveTo(hillX, GROUND_Y-30);
                ctx.quadraticCurveTo(hillX+70, GROUND_Y-90, hillX+140, GROUND_Y-30);
                ctx.fill();
            }
        }
        
        function drawPlatforms() {
            for(let plat of platforms) {
                let drawX = plat.x - cameraX;
                if(drawX + plat.w < 0 || drawX > canvas.width) continue;
                if(plat.type === 'ground') {
                    ctx.fillStyle = "#5b8c50";
                    ctx.fillRect(drawX, plat.y, plat.w, plat.h);
                    ctx.fillStyle = "#7caf5a";
                    ctx.fillRect(drawX, plat.y, plat.w, 8);
                    ctx.fillStyle = "#3c642a";
                    for(let i=0;i<plat.w/30;i++) ctx.fillRect(drawX+i*30, plat.y-4, 12, 6);
                } else if(plat.type === 'brick') {
                    ctx.fillStyle = "#bc7a3c";
                    ctx.fillRect(drawX, plat.y, plat.w, plat.h);
                    ctx.fillStyle = "#d48c4a";
                    ctx.fillRect(drawX, plat.y, plat.w, 6);
                    for(let i=0;i<2;i++) ctx.fillRect(drawX+5+i*20, plat.y-2, 8, 4);
                } else if(plat.type === 'wood') {
                    ctx.fillStyle = "#a5682a";
                    ctx.fillRect(drawX, plat.y, plat.w, plat.h);
                    ctx.fillStyle = "#c08648";
                    for(let i=0;i<3;i++) ctx.fillRect(drawX+5+i*25, plat.y+5, 5, 8);
                } else if(plat.type === 'stone') {
                    ctx.fillStyle = "#7f8c8d";
                    ctx.fillRect(drawX, plat.y, plat.w, plat.h);
                    ctx.fillStyle = "#95a5a6";
                    ctx.fillRect(drawX+5, plat.y-3, plat.w-10, 6);
                }
            }
        }
        
        function drawCoins() {
            for(let c of coins) {
                let drawX = c.x - cameraX;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ffcc44";
                ctx.fillStyle = "#FFD700";
                ctx.beginPath();
                ctx.ellipse(drawX+c.w/2, c.y+c.h/2, c.w/1.6, c.h/1.6, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#FFA500";
                ctx.beginPath();
                ctx.ellipse(drawX+c.w/2, c.y+c.h/2, c.w/2.8, c.h/2.8, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.fillRect(drawX+c.w*0.35, c.y+c.h*0.35, 3, 3);
                ctx.shadowBlur = 0;
            }
        }
        
        function drawEnemies() {
            for(let e of enemies) {
                let drawX = e.x - cameraX;
                // جسد غومبا لطيف
                ctx.fillStyle = "#8B5A2B";
                ctx.fillRect(drawX, e.y, e.w, e.h);
                ctx.fillStyle = "#5D3A1A";
                ctx.fillRect(drawX+6, e.y+8, e.w-12, 12);
                ctx.fillStyle = "white";
                ctx.fillRect(drawX+7, e.y+18, 6, 6);
                ctx.fillRect(drawX+e.w-13, e.y+18, 6, 6);
                ctx.fillStyle = "black";
                ctx.fillRect(drawX+8, e.y+19, 3, 3);
                ctx.fillRect(drawX+e.w-12, e.y+19, 3, 3);
                ctx.fillStyle = "#402818";
                ctx.fillRect(drawX+10, e.y+e.h-10, e.w-20, 6);
                // حواجب
                ctx.fillStyle = "#4a2a1a";
                ctx.fillRect(drawX+5, e.y+14, 7, 3);
                ctx.fillRect(drawX+e.w-12, e.y+14, 7, 3);
            }
        }
        
        function drawFlag() {
            let fX = flag.x - cameraX;
            ctx.fillStyle = "#c0392b";
            ctx.fillRect(fX, flag.y, 10, flag.h);
            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.moveTo(fX+10, flag.y+12);
            ctx.lineTo(fX+48, flag.y+28);
            ctx.lineTo(fX+10, flag.y+44);
            ctx.fill();
            ctx.fillStyle = "#f1c40f";
            ctx.font = "bold 24px monospace";
            ctx.fillText("🏁", fX+18, flag.y+34);
        }
        
        function drawPlayer() {
            let pX = player.x - cameraX;
            let inv = (player.invincibleTimer > 0 && (Math.floor(Date.now()/50) % 3 === 0));
            if(inv) ctx.globalAlpha = 0.6;
            // قبعة حمراء أنيقة
            ctx.fillStyle = "#E63946";
            ctx.fillRect(pX+4, player.y-12, 24, 14);
            ctx.fillStyle = "#C1121F";
            ctx.fillRect(pX+12, player.y-8, 8, 8);
            // وجه
            ctx.fillStyle = "#FDD7A4";
            ctx.fillRect(pX+6, player.y+4, 20, 22);
            // عيون كبيرة لطيفة
            ctx.fillStyle = "#1f1f1f";
            ctx.fillRect(pX+9, player.y+10, 5, 6);
            ctx.fillRect(pX+18, player.y+10, 5, 6);
            ctx.fillStyle = "white";
            ctx.fillRect(pX+10, player.y+11, 2, 3);
            ctx.fillRect(pX+19, player.y+11, 2, 3);
            // خدود
            ctx.fillStyle = "#F4A261";
            ctx.fillRect(pX+7, player.y+18, 4, 3);
            ctx.fillRect(pX+21, player.y+18, 4, 3);
            // شارب
            ctx.fillStyle = "#6B4226";
            ctx.fillRect(pX+10, player.y+22, 12, 4);
            // بدلة زرقاء
            ctx.fillStyle = "#2A6F8F";
            ctx.fillRect(pX+4, player.y+28, 24, 8);
            ctx.fillStyle = "#1E4A6B";
            ctx.fillRect(pX+10, player.y+32, 12, 5);
            // حذاء بني
            ctx.fillStyle = "#7B3F00";
            ctx.fillRect(pX+6, player.y+player.height-6, 8, 6);
            ctx.fillRect(pX+18, player.y+player.height-6, 8, 6);
            ctx.globalAlpha = 1;
            // اسم صغير على القبعة
            ctx.font = "bold 8px monospace";
            ctx.fillStyle = "#FFF9C4";
            ctx.fillText("SZ", pX+13, player.y-4);
        }
        
        function drawUIeffects() {
            ctx.font = "bold 18px 'Press Start 2P', monospace";
            ctx.fillStyle = "#FFE484";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ سوبريزون ⚡", canvas.width-150, 40);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#2C1A0A";
            ctx.fillText("→ ←  ⬆/Space", 18, 55);
        }
        
        function draw() {
            drawBackground();
            drawPlatforms();
            drawCoins();
            drawEnemies();
            drawFlag();
            drawPlayer();
            drawUIeffects();
            if(levelCompleted){
                ctx.font = "bold 28px monospace";
                ctx.fillStyle = "#FFD966";
                ctx.shadowBlur = 4;
                ctx.fillText("مستوى مكتمل!", canvas.width/2-130, 100);
            } else if(gameOverFlag){
                ctx.font = "bold 28px monospace";
                ctx.fillStyle = "#AA2E1E";
                ctx.fillText("انتهت اللعبة", canvas.width/2-100, 100);
            }
        }
        
        // الحلقة الرئيسية
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        // أحداث لوحة المفاتيح
        function handleKeyDown(e) {
            if(e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === ' ') {
                e.preventDefault();
            }
            if(e.key === 'ArrowLeft') keys.ArrowLeft = true;
            if(e.key === 'ArrowRight') keys.ArrowRight = true;
            if(e.key === 'ArrowUp') keys.ArrowUp = true;
            if(e.key === ' ') { keys.Space = true; e.preventDefault(); }
        }
        
        function handleKeyUp(e) {
            if(e.key === 'ArrowLeft') keys.ArrowLeft = false;
            if(e.key === 'ArrowRight') keys.ArrowRight = false;
            if(e.key === 'ArrowUp') keys.ArrowUp = false;
            if(e.key === ' ') { keys.Space = false; e.preventDefault(); }
        }
        
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        document.getElementById('resetButton').addEventListener('click', () => {
            fullGameReset();
            gameActive = true;
            levelCompleted = false;
            gameOverFlag = false;
            removeMessage();
            respawnPlayer();
        });
        
        updatePlayerStartY();
        player.y = startPosition.y;
        player.x = startPosition.x;
        fullGameReset();
        updateUI();
        gameLoop();
    })();
</script>
</body>
</html>
